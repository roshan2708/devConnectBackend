<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DevConnect Backend Tester</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
background:#0b0b0b;
color:#e5e5e5;
font-family:Inter;
margin:0;
}

.wrapper{
max-width:900px;
margin:auto;
padding:40px 20px;
}

h1{font-size:28px;margin-bottom:30px}
h2{font-size:18px;margin-bottom:10px}

.panel{
border:1px solid #1f1f1f;
padding:20px;
border-radius:8px;
margin-bottom:20px;
background:#111;
}

textarea,input{
width:100%;
background:#0b0b0b;
border:1px solid #2a2a2a;
color:#e5e5e5;
padding:10px;
border-radius:6px;
margin-top:8px;
}

button{
background:#1f1f1f;
border:1px solid #2a2a2a;
color:#e5e5e5;
padding:7px 14px;
margin-top:10px;
border-radius:6px;
cursor:pointer;
}

button:hover{background:#2a2a2a}

.post{
border:1px solid #1f1f1f;
padding:15px;
margin-top:12px;
border-radius:6px;
background:#0f0f0f;
}

.notification{
border-left:3px solid #444;
padding:10px;
margin-top:10px;
background:#0f0f0f;
}

</style>
</head>

<body>

<div class="wrapper">

<h1>DevConnect Backend Tester</h1>

<div class="panel">
<h2>Auth</h2>
<a href="/auth/google">
<button>Login With Google</button>
</a>
</div>

<div class="panel">
<h2>Profile</h2>
<button onclick="loadProfile()">Load Profile</button>
<div id="profileBox"></div>
</div>

<div class="panel">
<h2>Create Post</h2>
<textarea id="postContent"></textarea>
<button onclick="createPost()">Create Post</button>
</div>

<div class="panel">
<h2>Posts</h2>
<button onclick="loadPosts()">Load Posts</button>
<div id="postsContainer"></div>
</div>

<div class="panel">
<h2>Feed</h2>
<button onclick="loadFeed()">Load Feed</button>
<div id="feedContainer"></div>
</div>

<div class="panel">
<h2>Follow User</h2>
<input id="followUserId" placeholder="User ID">
<button onclick="followUser()">Follow</button>
<button onclick="unfollowUser()">Unfollow</button>
</div>

<div class="panel">
<h2>Comments</h2>
<input id="commentPostId" placeholder="Post ID">
<input id="commentContent" placeholder="Comment">
<button onclick="addComment()">Add Comment</button>
</div>

<div class="panel">
<h2>Search Developers</h2>
<input id="searchSkill" placeholder="Skill">
<button onclick="searchUsers()">Search</button>
<div id="searchResults"></div>
</div>

<div class="panel">
<h2>User Posts</h2>
<input id="userPostsId" placeholder="User ID">
<button onclick="getUserPosts()">Load</button>
<div id="userPostsBox"></div>
</div>

<div class="panel">
<h2>Trending Posts</h2>
<button onclick="loadTrending()">Load Trending</button>
<div id="trendingBox"></div>
</div>

<div class="panel">
<h2>Notifications</h2>
<button onclick="loadNotifications()">Load Notifications</button>
<div id="notificationsBox"></div>
</div>

</div>

<script>

async function loadProfile(){
const res=await fetch("/me")
const user=await res.json()
document.getElementById("profileBox").innerHTML=`${user.name}<br>${user.email}`
}

async function createPost(){

const content=document.getElementById("postContent").value

await fetch("/posts",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({content})
})

loadPosts()

}

function renderPost(post,container){

container.innerHTML+=`
<div class="post">

<b>User:</b> ${post.user_id}

<p id="post-text-${post.id}">${post.content}</p>

<input id="edit-${post.id}" style="display:none" value="${post.content}">

<br>

<button onclick="likePost(${post.id})">Like</button>

<button onclick="showEdit(${post.id})">Edit</button>

<button onclick="saveEdit(${post.id})">Save</button>

<button onclick="deletePost(${post.id})">Delete</button>

</div>
`

}

async function loadPosts(){

const res=await fetch("/posts")
const posts=await res.json()

const box=document.getElementById("postsContainer")
box.innerHTML=""

posts.forEach(p=>renderPost(p,box))

}

async function loadFeed(){

const res=await fetch("/feed")
const posts=await res.json()

const box=document.getElementById("feedContainer")
box.innerHTML=""

posts.forEach(p=>renderPost(p,box))

}

async function likePost(id){

await fetch("/posts/"+id+"/like",{method:"POST"})

alert("liked")

}

function showEdit(id){

document.getElementById("post-text-"+id).style.display="none"
document.getElementById("edit-"+id).style.display="block"

}

async function saveEdit(id){

const content=document.getElementById("edit-"+id).value

await fetch("/posts/"+id,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({content})
})

loadPosts()

}

async function deletePost(id){

await fetch("/posts/"+id,{method:"DELETE"})

loadPosts()

}

async function followUser(){

const id=document.getElementById("followUserId").value

await fetch("/follow/"+id,{method:"POST"})

alert("followed")

}

async function unfollowUser(){

const id=document.getElementById("followUserId").value

await fetch("/follow/"+id,{method:"DELETE"})

alert("unfollowed")

}

async function addComment(){

const post=document.getElementById("commentPostId").value
const content=document.getElementById("commentContent").value

await fetch("/posts/"+post+"/comment",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({content})
})

alert("comment added")

}

async function searchUsers(){

const skill=document.getElementById("searchSkill").value

const res=await fetch("/search?skill="+skill)
const users=await res.json()

const box=document.getElementById("searchResults")
box.innerHTML=""

users.forEach(u=>{
box.innerHTML+=`<div class="post">${u.name} - ${u.skills}</div>`
})

}

async function getUserPosts(){

const id=document.getElementById("userPostsId").value

const res=await fetch("/users/"+id+"/posts")
const posts=await res.json()

const box=document.getElementById("userPostsBox")
box.innerHTML=""

posts.forEach(p=>{
box.innerHTML+=`<div class="post">${p.content}</div>`
})

}

async function loadTrending(){

const res=await fetch("/trending")
const posts=await res.json()

const box=document.getElementById("trendingBox")
box.innerHTML=""

posts.forEach(p=>{
box.innerHTML+=`<div class="post">${p.content}</div>`
})

}

async function loadNotifications(){

const res=await fetch("/notifications")
const data=await res.json()

const box=document.getElementById("notificationsBox")
box.innerHTML=""

data.forEach(n=>{
box.innerHTML+=`<div class="notification">${n.message}</div>`
})

}

</script>

</body>
</html>
