<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevConnect | API Test Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>

:root{
--primary:#4285F4;
--primary-hover:#357ae8;
--bg-gradient:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
--glass-bg:rgba(255,255,255,0.95);
--text-main:#1f2937;
--text-muted:#6b7280;
}

body{
font-family:'Inter',sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background:var(--bg-gradient);
margin:0;
}

.card{
background:var(--glass-bg);
padding:3rem;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.15);
text-align:center;
max-width:700px;
width:90%;
}

.btn{
background:#4285F4;
color:white;
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

textarea,input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
margin-top:8px;
}

.post{
border:1px solid #ddd;
padding:10px;
border-radius:8px;
margin-top:10px;
text-align:left;
background:white;
}

.list-box{
background:white;
border:1px solid #ddd;
border-radius:8px;
padding:10px;
margin-top:10px;
text-align:left;
}

hr{margin:25px 0;}

.logout{
color:#ef4444;
text-decoration:none;
}

</style>

</head>

<body>

<div class="card">

<div id="loginView">

<h2>DevConnect</h2>
<p>Login with Google to test backend APIs</p>

<a href="/auth/google">
<button class="btn">Login with Google</button>
</a>

</div>

<div id="dashboard" style="display:none;">

<h2 id="userName">Welcome</h2>

<a href="/logout/google" class="logout">Logout</a>

<hr>

<h3>My Profile (/me)</h3>

<button class="btn" onclick="loadProfile()">Load Profile</button>

<div id="profileBox" class="list-box"></div>

<hr>

<h3>Update Profile</h3>

<input id="bio" placeholder="Bio">
<input id="github" placeholder="GitHub URL">
<input id="skills" placeholder="Skills (comma separated)">
<input id="location" placeholder="Location">

<button class="btn" onclick="updateProfile()">Update Profile</button>

<hr>

<h3>View Any User Profile</h3>

<input id="viewUserID" placeholder="Enter user ID">

<button class="btn" onclick="getUser()">Load User</button>

<div id="userProfile" class="list-box"></div>

<hr>

<h3>Create Post</h3>

<textarea id="postContent" rows="3" placeholder="Share something..."></textarea>

<button class="btn" onclick="createPost()">Create Post</button>

<hr>

<h3>All Posts</h3>

<button class="btn" onclick="loadPosts()">Load All Posts</button>

<div id="postsContainer"></div>

<hr>

<h3>Personalized Feed</h3>

<button class="btn" onclick="loadFeed()">Load My Feed</button>

<div id="feedContainer"></div>

<hr>

<h3>Follow Developer</h3>

<input id="followUserID" placeholder="Enter user ID to follow">

<button class="btn" onclick="followUser()">Follow</button>

<hr>

<h3>Followers</h3>

<input id="followersUserID" placeholder="User ID">

<button class="btn" onclick="loadFollowers()">Load Followers</button>

<div id="followersContainer" class="list-box"></div>

<hr>

<h3>Following</h3>

<input id="followingUserID" placeholder="User ID">

<button class="btn" onclick="loadFollowing()">Load Following</button>

<div id="followingContainer" class="list-box"></div>

</div>

</div>

<script>

const urlParams=new URLSearchParams(window.location.search);

if(urlParams.has('success')){
document.getElementById("loginView").style.display="none";
document.getElementById("dashboard").style.display="block";

loadProfile();
}

async function loadProfile(){

const res=await fetch("/me");

const user=await res.json();

document.getElementById("userName").innerText="Welcome "+user.name;

document.getElementById("profileBox").innerHTML=
`<b>ID:</b> ${user.id}<br>
<b>Email:</b> ${user.email}`;

}

async function updateProfile(){

const bio=document.getElementById("bio").value;
const github=document.getElementById("github").value;
const skills=document.getElementById("skills").value;
const location=document.getElementById("location").value;

const res=await fetch("/profile",{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({bio,github,skills,location})
});

if(res.ok){
alert("Profile Updated");
}

}

async function getUser(){

const id=document.getElementById("viewUserID").value;

const res=await fetch("/users/"+id);

const user=await res.json();

document.getElementById("userProfile").innerHTML=
`<b>Name:</b> ${user.name}<br>
<b>Bio:</b> ${user.bio}<br>
<b>Skills:</b> ${user.skills}<br>
<b>GitHub:</b> ${user.github}`;

}

async function createPost(){

const content=document.getElementById("postContent").value;

const res=await fetch("/posts",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({content})
});

if(res.ok){
alert("Post Created");
loadPosts();
}

}

async function loadPosts(){

const res=await fetch("/posts");
const posts=await res.json();

const container=document.getElementById("postsContainer");
container.innerHTML="";

posts.forEach(post=>{
container.innerHTML+=
`<div class="post">
<b>${post.user_id}</b>
<p>${post.content}</p>
</div>`;
});

}

async function loadFeed(){

const res=await fetch("/feed");
const posts=await res.json();

const container=document.getElementById("feedContainer");
container.innerHTML="";

posts.forEach(post=>{
container.innerHTML+=
`<div class="post">
<b>${post.user_id}</b>
<p>${post.content}</p>
</div>`;
});

}

async function followUser(){

const id=document.getElementById("followUserID").value;

await fetch("/follow/"+id,{method:"POST"});

alert("Followed");

}

async function loadFollowers(){

const id=document.getElementById("followersUserID").value;

const res=await fetch("/followers/"+id);

const data=await res.json();

document.getElementById("followersContainer").innerHTML=data.join("<br>");

}

async function loadFollowing(){

const id=document.getElementById("followingUserID").value;

const res=await fetch("/following/"+id);

const data=await res.json();

document.getElementById("followingContainer").innerHTML=data.join("<br>");

}

</script>

</body>
</html>
