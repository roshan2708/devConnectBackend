<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevConnect | API Test Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>

:root{
--primary:#4285F4;
--primary-hover:#357ae8;
--bg-gradient:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
--glass-bg:rgba(255,255,255,0.95);
--text-main:#1f2937;
--text-muted:#6b7280;
}

body{
font-family:'Inter',sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background:var(--bg-gradient);
margin:0;
}

.card{
background:var(--glass-bg);
padding:3rem;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.15);
text-align:center;
max-width:600px;
width:90%;
}

h2{color:var(--text-main);}
p{color:var(--text-muted);}

.btn{
background:var(--primary);
color:white;
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
margin-top:10px;
}

.btn:hover{
background:var(--primary-hover);
}

textarea,input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
margin-top:8px;
font-family:inherit;
}

.post{
border:1px solid #e5e7eb;
padding:10px;
border-radius:8px;
margin-top:10px;
text-align:left;
background:white;
}

hr{margin:25px 0;}

.logout{
color:#ef4444;
text-decoration:none;
font-size:14px;
}

.list-box{
background:white;
border:1px solid #ddd;
border-radius:8px;
padding:10px;
margin-top:10px;
text-align:left;
}

</style>

</head>

<body>

<div class="card">

<div id="loginView">

<h2>DevConnect</h2>
<p>Login with Google to test backend APIs</p>

<a href="/auth/google">
<button class="btn">
<i data-lucide="log-in"></i> Login with Google
</button>
</a>

</div>

<div id="dashboard" style="display:none;">

<h2 id="userName">Welcome</h2>
<a href="/logout/google" class="logout">Logout</a>

<hr>

<h3>Create Post</h3>

<textarea id="postContent" rows="3" placeholder="Share something..."></textarea>

<button class="btn" onclick="createPost()">Create Post</button>

<hr>

<h3>Posts Feed</h3>

<button class="btn" onclick="loadPosts()">Load Posts</button>

<div id="postsContainer"></div>

<hr>

<h3>Follow Developer</h3>

<input id="followUserID" placeholder="Enter user ID to follow">

<button class="btn" onclick="followUser()">Follow</button>

<hr>

<h3>Followers</h3>

<input id="followersUserID" placeholder="User ID">

<button class="btn" onclick="loadFollowers()">Load Followers</button>

<div id="followersContainer" class="list-box"></div>

<hr>

<h3>Following</h3>

<input id="followingUserID" placeholder="User ID">

<button class="btn" onclick="loadFollowing()">Load Following</button>

<div id="followingContainer" class="list-box"></div>

</div>

</div>

<script>

lucide.createIcons();

const urlParams=new URLSearchParams(window.location.search);

if(urlParams.has('success')){
document.getElementById("loginView").style.display="none";
document.getElementById("dashboard").style.display="block";

const name=urlParams.get("name");

if(name){
document.getElementById("userName").innerText="Welcome, "+decodeURIComponent(name);
}

loadProfile();
}

async function loadProfile(){

const res=await fetch("/me");

if(!res.ok) return;

const user=await res.json();

document.getElementById("userName").innerText="Welcome, "+user.name;

}

async function createPost(){

const content=document.getElementById("postContent").value;

if(!content){
alert("Write something first");
return;
}

const res=await fetch("/posts",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({content})
});

if(res.ok){
alert("Post created!");
document.getElementById("postContent").value="";
loadPosts();
}

}

async function loadPosts(){

const res=await fetch("/posts");
const posts=await res.json();

const container=document.getElementById("postsContainer");

container.innerHTML="";

posts.forEach(post=>{

const div=document.createElement("div");
div.className="post";

div.innerHTML=`
<b>User:</b> ${post.user_id}<br>
<p>${post.content}</p>
<small>${post.created_at}</small>
`;

container.appendChild(div);

});

}

async function followUser(){

const id=document.getElementById("followUserID").value;

if(!id){
alert("Enter user ID");
return;
}

const res=await fetch("/follow/"+id,{
method:"POST"
});

if(res.ok){
alert("Followed successfully!");
}

}

async function loadFollowers(){

const id=document.getElementById("followersUserID").value;

const res=await fetch("/followers/"+id);

const data=await res.json();

const box=document.getElementById("followersContainer");

box.innerHTML=data.map(u=>"<div>"+u+"</div>").join("");

}

async function loadFollowing(){

const id=document.getElementById("followingUserID").value;

const res=await fetch("/following/"+id);

const data=await res.json();

const box=document.getElementById("followingContainer");

box.innerHTML=data.map(u=>"<div>"+u+"</div>").join("");

}

</script>

</body>
</html>
