<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevConnect | API Test Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
--primary:#4285F4;
--bg-gradient:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
}

body{
font-family:'Inter',sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background:var(--bg-gradient);
margin:0;
}

.card{
background:white;
padding:30px;
border-radius:15px;
width:820px;
}

textarea,input{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:1px solid #ddd;
}

.btn{
background:#4285F4;
color:white;
padding:8px 16px;
border:none;
border-radius:6px;
margin-top:8px;
cursor:pointer;
margin-right:5px;
}

.delete-btn{ background:#ef4444; }
.edit-btn{ background:#f59e0b; }

.post{
border:1px solid #ddd;
padding:12px;
margin-top:12px;
border-radius:8px;
}

.comment-box{
margin-top:10px;
padding:8px;
border-left:3px solid #4285F4;
background:#f9f9f9;
}

.notification{
border-left:4px solid #4285F4;
background:#f2f6ff;
padding:10px;
margin-top:10px;
border-radius:6px;
}

hr{margin:25px 0;}
</style>

</head>

<body>

<div class="card">

<div id="loginView">
<h2>DevConnect</h2>
<p>Login with Google</p>
<a href="/auth/google">
<button class="btn">Login</button>
</a>
</div>

<div id="dashboard" style="display:none;">

<h2 id="userName">Welcome</h2>
<a href="/logout/google">Logout</a>

<hr>

<h3>Notifications 🔔</h3>
<button class="btn" onclick="loadNotifications()">Load Notifications</button>
<div id="notificationsBox"></div>

<hr>

<h3>My Profile</h3>
<button class="btn" onclick="loadProfile()">Load Profile</button>
<div id="profileBox"></div>

<hr>

<h3>Create Post</h3>
<textarea id="postContent" rows="3"></textarea>
<button class="btn" onclick="createPost()">Create Post</button>

<hr>

<h3>All Posts</h3>
<button class="btn" onclick="loadPosts()">Load Posts</button>
<div id="postsContainer"></div>

<hr>

<h3>My Feed</h3>
<button class="btn" onclick="loadFeed()">Load Feed</button>
<div id="feedContainer"></div>

</div>
</div>

<script>

const urlParams=new URLSearchParams(window.location.search);

if(urlParams.has('success')){
document.getElementById("loginView").style.display="none";
document.getElementById("dashboard").style.display="block";
loadProfile();
}

async function loadNotifications(){
const res=await fetch("/notifications");
const notifications=await res.json();
const box=document.getElementById("notificationsBox");
box.innerHTML="";

notifications.forEach(n=>{
box.innerHTML+=`
<div class="notification">
<b>${n.type}</b><br>
${n.message}
</div>`;
});
}

async function loadProfile(){
const res=await fetch("/me");
const user=await res.json();
document.getElementById("userName").innerText="Welcome "+user.name;
document.getElementById("profileBox").innerHTML=`ID: ${user.id}<br>Email: ${user.email}`;
}

async function createPost(){
const content=document.getElementById("postContent").value;

await fetch("/posts",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({content})
});

document.getElementById("postContent").value="";
loadPosts();
}

function renderPost(post,container){

container.innerHTML+=`
<div class="post">

<b>User:</b> ${post.user_id}

<p id="post-text-${post.id}">${post.content}</p>

<input id="edit-input-${post.id}" style="display:none" value="${post.content}">

<br>

<button class="btn" onclick="likePost(${post.id})">👍 Like</button>

<button class="btn edit-btn" onclick="showEdit(${post.id})">✏️ Edit</button>

<button class="btn" onclick="saveEdit(${post.id})">💾 Save</button>

<button class="btn delete-btn" onclick="deletePost(${post.id})">🗑 Delete</button>

</div>
`;
}

async function loadPosts(){
const res=await fetch("/posts");
const posts=await res.json();

const container=document.getElementById("postsContainer");
container.innerHTML="";

posts.forEach(post=>renderPost(post,container));
}

async function loadFeed(){
const res=await fetch("/feed");
const posts=await res.json();

const container=document.getElementById("feedContainer");
container.innerHTML="";

posts.forEach(post=>renderPost(post,container));
}

function showEdit(postID){
document.getElementById("post-text-"+postID).style.display="none";
document.getElementById("edit-input-"+postID).style.display="block";
}

async function saveEdit(postID){

const newContent=document.getElementById("edit-input-"+postID).value;

const res=await fetch("/posts/"+postID,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({content:newContent})
});

if(res.ok){
alert("Post updated");
loadPosts();
loadFeed();
}else{
alert("Update failed");
}
}

async function deletePost(postID){

const confirmDelete=confirm("Delete this post?");
if(!confirmDelete) return;

const res=await fetch("/posts/"+postID,{method:"DELETE"});

if(res.ok){
alert("Post deleted");
loadPosts();
loadFeed();
}else{
alert("Delete failed");
}
}

async function likePost(postID){
await fetch("/posts/"+postID+"/like",{method:"POST"});
alert("Post Liked");
}

</script>

</body>
</html>
