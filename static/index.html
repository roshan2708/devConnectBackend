<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevConnect | API Test Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

:root{
--primary:#4285F4;
--bg-gradient:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
}

body{
font-family:'Inter',sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background:var(--bg-gradient);
margin:0;
}

.card{
background:white;
padding:30px;
border-radius:15px;
width:750px;
}

textarea,input{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:1px solid #ddd;
}

.btn{
background:#4285F4;
color:white;
padding:10px 18px;
border:none;
border-radius:6px;
margin-top:10px;
cursor:pointer;
}

.post{
border:1px solid #ddd;
padding:12px;
margin-top:12px;
border-radius:8px;
}

hr{margin:25px 0;}

</style>

</head>

<body>

<div class="card">

<div id="loginView">

<h2>DevConnect</h2>
<p>Login with Google</p>

<a href="/auth/google">
<button class="btn">Login</button>
</a>

</div>

<div id="dashboard" style="display:none;">

<h2 id="userName">Welcome</h2>

<a href="/logout/google">Logout</a>

<hr>

<h3>My Profile</h3>

<button class="btn" onclick="loadProfile()">Load Profile</button>

<div id="profileBox"></div>

<hr>

<h3>Update Profile</h3>

<input id="bio" placeholder="Bio">
<input id="github" placeholder="GitHub">
<input id="skills" placeholder="Skills">
<input id="location" placeholder="Location">

<button class="btn" onclick="updateProfile()">Update Profile</button>

<hr>

<h3>Create Post</h3>

<textarea id="postContent" rows="3"></textarea>

<button class="btn" onclick="createPost()">Create Post</button>

<hr>

<h3>All Posts</h3>

<button class="btn" onclick="loadPosts()">Load Posts</button>

<div id="postsContainer"></div>

<hr>

<h3>My Feed</h3>

<button class="btn" onclick="loadFeed()">Load Feed</button>

<div id="feedContainer"></div>

<hr>

<h3>Follow User</h3>

<input id="followUserID" placeholder="User ID">

<button class="btn" onclick="followUser()">Follow</button>

<hr>

<h3>Followers</h3>

<input id="followersUserID" placeholder="User ID">

<button class="btn" onclick="loadFollowers()">Load Followers</button>

<div id="followersContainer"></div>

<hr>

<h3>Following</h3>

<input id="followingUserID" placeholder="User ID">

<button class="btn" onclick="loadFollowing()">Load Following</button>

<div id="followingContainer"></div>

</div>

</div>

<script>

const urlParams=new URLSearchParams(window.location.search);

if(urlParams.has('success')){
document.getElementById("loginView").style.display="none";
document.getElementById("dashboard").style.display="block";
loadProfile();
}

async function loadProfile(){

const res=await fetch("/me");
const user=await res.json();

document.getElementById("userName").innerText="Welcome "+user.name;

document.getElementById("profileBox").innerHTML=
`ID: ${user.id}<br>Email: ${user.email}`;
}

async function updateProfile(){

const bio=document.getElementById("bio").value;
const github=document.getElementById("github").value;
const skills=document.getElementById("skills").value;
const location=document.getElementById("location").value;

await fetch("/profile",{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({bio,github,skills,location})
});

alert("Profile Updated");
}

async function createPost(){

const content=document.getElementById("postContent").value;

await fetch("/posts",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({content})
});

loadPosts();
}

async function loadPosts(){

const res=await fetch("/posts");
const posts=await res.json();

const container=document.getElementById("postsContainer");
container.innerHTML="";

posts.forEach(post=>{

container.innerHTML+=`
<div class="post">
<b>User:</b> ${post.user_id}
<p>${post.content}</p>

<button class="btn" onclick="likePost(${post.id})">Like</button>

<button class="btn" onclick="viewLikes(${post.id})">View Likes</button>

<div id="likes-${post.id}"></div>

</div>
`;
});
}

async function loadFeed(){

const res=await fetch("/feed");
const posts=await res.json();

const container=document.getElementById("feedContainer");
container.innerHTML="";

posts.forEach(post=>{
container.innerHTML+=`
<div class="post">
<b>${post.user_id}</b>
<p>${post.content}</p>

<button class="btn" onclick="likePost(${post.id})">Like</button>

<button class="btn" onclick="viewLikes(${post.id})">View Likes</button>

<div id="likes-${post.id}"></div>

</div>
`;
});
}

async function likePost(postID){

await fetch("/posts/"+postID+"/like",{method:"POST"});

alert("Post Liked");

}

async function viewLikes(postID){

const res=await fetch("/posts/"+postID+"/likes");

const users=await res.json();

document.getElementById("likes-"+postID).innerHTML=
"<b>Likes:</b><br>"+users.join("<br>");
}

async function followUser(){

const id=document.getElementById("followUserID").value;

await fetch("/follow/"+id,{method:"POST"});

alert("Followed");

}

async function loadFollowers(){

const id=document.getElementById("followersUserID").value;

const res=await fetch("/followers/"+id);

const data=await res.json();

document.getElementById("followersContainer").innerHTML=data.join("<br>");

}

async function loadFollowing(){

const id=document.getElementById("followingUserID").value;

const res=await fetch("/following/"+id);

const data=await res.json();

document.getElementById("followingContainer").innerHTML=data.join("<br>");

}

</script>

</body>
</html>
