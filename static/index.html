<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevConnect | API Test Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>

:root{
--primary:#4285F4;
--primary-hover:#357ae8;
--bg-gradient:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
--glass-bg:rgba(255,255,255,0.95);
--text-main:#1f2937;
--text-muted:#6b7280;
}

body{
font-family:'Inter',sans-serif;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background:var(--bg-gradient);
margin:0;
}

.card{
background:var(--glass-bg);
padding:3rem;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.15);
text-align:center;
max-width:500px;
width:90%;
}

h2{
color:var(--text-main);
margin-bottom:5px;
}

p{
color:var(--text-muted);
margin-bottom:20px;
}

.btn{
background:var(--primary);
color:white;
padding:12px 22px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

.btn:hover{
background:var(--primary-hover);
}

textarea{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
resize:none;
font-family:inherit;
}

.post{
border:1px solid #e5e7eb;
padding:12px;
border-radius:10px;
margin-top:10px;
text-align:left;
background:white;
}

hr{
margin:25px 0;
}

.logout{
color:#ef4444;
text-decoration:none;
font-size:14px;
}

</style>

</head>

<body>

<div class="card">

<div id="loginView">

<h2>DevConnect</h2>
<p>Login with Google to test backend APIs</p>

<a href="/auth/google">
<button class="btn">
<i data-lucide="log-in"></i> Login with Google
</button>
</a>

</div>

<div id="dashboard" style="display:none;">

<h2 id="userName">Welcome</h2>

<a href="/logout/google" class="logout">Logout</a>

<hr>

<h3>Create Post</h3>

<textarea id="postContent" rows="3" placeholder="Share something..."></textarea>

<br><br>

<button class="btn" onclick="createPost()">Create Post</button>

<hr>

<h3>Posts Feed</h3>

<button class="btn" onclick="loadPosts()">Load Posts</button>

<div id="postsContainer"></div>

</div>

</div>

<script>

lucide.createIcons();

const urlParams=new URLSearchParams(window.location.search);

if(urlParams.has('success')){
document.getElementById("loginView").style.display="none";
document.getElementById("dashboard").style.display="block";

const name=urlParams.get("name");

if(name){
document.getElementById("userName").innerText="Welcome, "+decodeURIComponent(name);
}

loadProfile();
}

async function loadProfile(){

try{

const res=await fetch("/me");

if(!res.ok) return;

const user=await res.json();

document.getElementById("userName").innerText="Welcome, "+user.name;

}catch(err){
console.log(err);
}

}

async function createPost(){

const content=document.getElementById("postContent").value;

if(!content){
alert("Write something first");
return;
}

const res=await fetch("/posts",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
content:content
})
});

if(res.ok){

alert("Post created!");

document.getElementById("postContent").value="";

loadPosts();

}else{

alert("Failed to create post");

}

}

async function loadPosts(){

const res=await fetch("/posts");

const posts=await res.json();

const container=document.getElementById("postsContainer");

container.innerHTML="";

posts.forEach(post=>{

const div=document.createElement("div");

div.className="post";

div.innerHTML=`
<b>User:</b> ${post.user_id}<br>
<p>${post.content}</p>
<small>${post.created_at}</small>
`;

container.appendChild(div);

});

}

</script>

</body>
</html>
